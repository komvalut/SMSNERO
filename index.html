<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSNERO - P2P</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .orange-text { color: #ff9500; }
        .sms-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-top: 20px; }
        .nav-btn { background: #1a1a1a; border: none; color: #888; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .nav-btn.active { background: #333; color: #ff9500; }
        .number-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .buy-btn { background: none; border: 1px solid #ff9500; color: #ff9500; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        #invoice-area { display: none; margin-top: 20px; background: #000; padding: 10px; border: 1px dashed #ff9500; }
        textarea { width: 100%; background: #000; color: #ff9500; border: none; font-size: 10px; height: 60px; resize: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMSNERO <span class="orange-text">⚡</span></h1>
        
        <div style="background: #111; padding: 15px; border-radius: 15px; border: 1px dashed #ff9500;">
            <h4 style="margin: 0 0 10px 0; color: #ff9500;">🛠 Admin: Add Number</h4>
            <input type="text" id="numIn" placeholder="+381...">
            <input type="number" id="priceIn" placeholder="Sats">
            <button onclick="addNew()" style="width: 100%; background: #ff9500; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">POST TO MARKET</button>
        </div>

        <div class="sms-card">
            <h3>P2P SMS Market</h3>
            <div id="list">
                <div class="number-item">
                    <span>🇷🇸 +381 6X TEST</span>
                    <button class="buy-btn" onclick="buy(1, 'TEST')">1 sat</button>
                </div>
            </div>

            <div id="invoice-area">
                <p class="orange-text" style="font-size: 12px;">⚡ Invoice Created! Pay below:</p>
                <textarea id="invCode" readonly></textarea>
                <p style="font-size: 10px; color: #555;">After payment, wait for the code.</p>
            </div>
        </div>
    </div>

    <script>
        function addNew() {
            const n = document.getElementById('numIn').value;
            const p = document.getElementById('priceIn').value;
            if(!n || !p) return;
            const item = document.createElement('div');
            item.className = 'number-item';
            item.innerHTML = `<span>🇷🇸 ${n}</span><button class="buy-btn" onclick="buy(${p}, '${n}')">${p} sats</button>`;
            document.getElementById('list').appendChild(item);
        }

        async function buy(amount, phone) {
            const area = document.getElementById('invoice-area');
            const txt = document.getElementById('invCode');
            txt.value = "Loading invoice...";
            area.style.display = "block";

            try {
                const res = await fetch('/api/make-invoice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: amount, memo: "SMS for " + phone })
                });
                const data = await res.json();
                if(data.payment_request) {
                    txt.value = data.payment_request;
                } else {
                    txt.value = "Error: Check Alby Token on Render!";
                }
            } catch(e) {
                txt.value = "Error: Server is offline. Check Render logs!";
            }
        }
    </script>
</body>
</html>
