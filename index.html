<!DOCTYPE html>
<html>
<head>
    <title>SMSNERO ⚡</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .box { max-width: 350px; margin: auto; background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .btn { background: #ff9500; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; color: #ff9500; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SMSNERO ⚡</h1>
        <p>Price: 1 sat</p>
        <button class="btn" onclick="buy()">BUY SMS CODE</button>
        <div id="status"></div>
    </div>

    <script>
        let invoiceId = null;

        async function buy() {
            document.getElementById('status').innerText = "Creating invoice...";
            try {
                const res = await fetch('/api/make-invoice', { method: 'POST' });
                const data = await res.json();
                if(data.payment_url) {
                    invoiceId = data.id;
                    window.location.href = data.payment_url; // Šalje te na plaćanje
                }
            } catch (e) { document.getElementById('status').innerText = "Error!"; }
        }

        // Proverava kod čim se vratiš sa plaćanja
        setInterval(async () => {
            const res = await fetch('/api/get-my-code');
            const data = await res.json();
            if(data.code) {
                document.querySelector('.box').innerHTML = `<h1>YOUR CODE:</h1><h1 style="color:#ff9500">${data.code}</h1>`;
            }
        }, 3000);
    </script>
</body>
</html>
