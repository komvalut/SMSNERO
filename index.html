<div id="p2p-section" class="tab-content">
    
    <div class="admin-panel" style="background: #111; border: 1px dashed #ff9500; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
        <h4 style="color: #ff9500; margin-top: 0;">🛠 Admin: Add My Number</h4>
        <input type="text" id="new-number" placeholder="+381 6..." style="width: 60%; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
        <input type="number" id="new-price" placeholder="sats" style="width: 30%; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff;">
        <button onclick="addNumberToList()" style="width: 100%; margin-top: 10px; background: #ff9500; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">
            POST TO MARKET
        </button>
    </div>

    <div class="sms-card">
        <h3>P2P SMS Market</h3>
        <p class="small-text">Verified Sellers & Escrow Protection</p>
        
        <div class="p2p-list" id="p2p-market-list">
            <div class="number-item">
                <span>🇷🇸 +381 61 TEST BR</span>
                <button class="buy-small" onclick="testPay()">1 sat</button>
            </div>
        </div>

        <div id="waiting-area" style="display:none; margin-top:20px;">
            <p class="orange-text">Waiting for Code...</p>
            <div class="code-box">_ _ _ _ _ _</div>
        </div>
    </div>
</div>
