<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SMSNERO ⚡ AUTOMATED</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 400px; background: #151515; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .orange { color: #ff9500; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; }
        .btn { background: #ff9500; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status-box { display: none; margin-top: 20px; padding: 15px; border: 1px dashed #ff9500; border-radius: 10px; background: #000; }
        .loader { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SMSNERO <span class="orange">⚡</span></h1>
        <p style="font-size: 12px; color: #666;">P2P SMS Market - Automated</p>

        <div style="border-bottom: 1px solid #222; margin-bottom: 20px; padding-bottom: 20px;">
            <h4 class="orange">Admin: Post Number</h4>
            <input type="text" id="phone" placeholder="Phone Number (e.g. +46...)">
            <input type="number" id="price" placeholder="Price in Sats">
            <button class="btn" onclick="addNum()">POST TO MARKET</button>
        </div>

        <div id="market">
            </div>

        <div id="status-box">
            <p id="msg">Generating Invoice...</p>
            <textarea id="inv" readonly style="width:100%; height:60px; background:#111; color:#ff9500; border:none; font-size:10px;"></textarea>
            <div id="loading-msg" class="loader">Waiting for payment...</div>
        </div>
    </div>

    <script>
        function addNum() {
            const p = document.getElementById('phone').value;
            const s = document.getElementById('price').value;
            const div = document.createElement('div');
            div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; background:#222; padding:10px; margin-top:5px; border-radius:8px;">
                <span>🇸🇪 ${p}</span>
                <button onclick="startBuy(${s}, '${p}')" style="background:#ff9500; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">${s} sats</button>
            </div>`;
            document.getElementById('market').appendChild(div);
        }

        async function startBuy(amt, phone) {
            document.getElementById('status-box').style.display = "block";
            const res = await fetch('/api/make-invoice', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount: amt, memo: "SMS for " + phone })
            });
            const data = await res.json();
            document.getElementById('inv').value = data.payment_request;
            
            // Počni promenu statusa
            checkPay(data.payment_hash, phone);
        }

        function checkPay(hash, phone) {
            const i = setInterval(async () => {
                const res = await fetch('/api/check-payment/' + hash);
                const d = await res.json();
                if(d.settled) {
                    clearInterval(i);
                    document.getElementById('loading-msg').innerHTML = "✅ PAID! Waiting for SMS from provider...";
                    waitForSMS(phone);
                }
            }, 3000);
        }

        function waitForSMS(phone) {
            const i = setInterval(async () => {
                const res = await fetch('/api/get-my-code/' + phone);
                const d = await res.json();
                if(d.code) {
                    clearInterval(i);
                    document.getElementById('status-box').innerHTML = `<h3 style="color:#00ff00;">YOUR CODE:</h3><div style="font-size:24px; font-weight:bold; background:#000; padding:20px; border:2px solid #00ff00;">${d.code}</div>`;
                }
            }, 2000);
        }
    </script>
</body>
</html>
