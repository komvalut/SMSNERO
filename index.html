<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSNERO ⚡</title>
    <style>
        body { background: #0b0b0b; color: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 350px; background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .btn { background: #ff9500; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; color: #ff9500; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMSNERO <span style="color:#ff9500">⚡</span></h1>
        <p>Testing Mode (1 Sat)</p>
        <input type="text" id="phone" placeholder="Enter phone number">
        <button class="btn" onclick="start()">BUY CODE</button>
        <div id="status"></div>
    </div>

    <script>
        async function start() {
            const phone = document.getElementById('phone').value;
            if(!phone) return alert("Phone required!");
            
            document.getElementById('status').innerText = "Creating invoice...";
            
            try {
                const res = await fetch('/api/make-invoice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: 1, phone: phone })
                });
                const data = await res.json();
                
                if(data.payment_url) {
                    // Ovo te šalje na plaćanje u istom prozoru
                    window.location.href = data.payment_url;
                } else {
                    document.getElementById('status').innerText = "Error creating payment.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Server error.";
            }
        }
    </script>
</body>
</html>
