<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSNERO - P2P Market</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { width: 360px; text-align: center; }
        .orange-text { color: #ff9500; }
        .green-text { color: #00ff00; }
        .main-nav { display: flex; justify-content: space-between; margin-bottom: 20px; background: #1a1a1a; border-radius: 12px; padding: 5px; }
        .nav-btn { background: none; border: none; color: #888; padding: 10px; cursor: pointer; font-weight: bold; flex: 1; font-size: 12px; }
        .nav-btn.active { background: #333; color: #ff9500; border-radius: 8px; }
        .sms-card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .number-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; }
        .buy-small { background: #333; color: #ff9500; border: 1px solid #ff9500; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        #invoice-text { width: 100%; height: 80px; background: #000; color: #ff9500; border: 1px dashed #ff9500; padding: 10px; box-sizing: border-box; font-size: 10px; overflow-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMSNERO <span class="orange-text">⚡</span></h1>
        
        <div class="main-nav">
            <button class="nav-btn" onclick="showTab('otp')">RECEIVE</button>
            <button class="nav-btn active" onclick="showTab('p2p')">P2P MARKET</button>
        </div>

        <div id="otp-section" class="tab-content">
            <div class="sms-card"><h3>OTP Service</h3><p>Coming Soon...</p></div>
        </div>

        <div id="p2p-section" class="tab-content active">
            <div style="background: #111; border: 1px dashed #ff9500; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <h4 style="color: #ff9500; margin-top: 0;">🛠 Admin: Add Number</h4>
                <input type="text" id="new-number" placeholder="+381 6...">
                <input type="number" id="new-price" placeholder="Price in sats">
                <button onclick="addNumberToList()" style="width: 100%; background: #ff9500; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">POST TO MARKET</button>
            </div>

            <div class="sms-card">
                <h3>P2P SMS Market</h3>
                <div id="p2p-market-list">
                    <div class="number-item">
                        <span>🇷🇸 +381 6X TEST</span>
                        <button class="buy-small" onclick="payInvoice(1, 'TEST')">1 sat</button>
                    </div>
                </div>

                <div id="waiting-area" style="display:none; margin-top:20px; border-top: 1px solid #333; padding-top: 10px;">
                    <p class="orange-text">⚡ Invoice Created:</p>
                    <textarea id="invoice-text" readonly></textarea>
                    <p style="font-size: 12px; color: #888;">Pay this invoice to receive your code.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(t + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        function addNumberToList() {
            const n = document.getElementById('new-number').value;
            const p = document.getElementById('new-price').value;
            if(!n || !p) return;
            const list = document.getElementById('p2p-market-list');
            const div = document.createElement('div');
            div.className = 'number-item';
            div.innerHTML = `<span>🇷🇸 ${n}</span><button class="buy-small" onclick="payInvoice(${p}, '${n}')">${p} sats</button>`;
            list.appendChild(div);
        }

        async function payInvoice(amt, num) {
            try {
                const res = await fetch('/api/make-invoice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount: amt, memo: "SMS for " + num })
                });
                const data = await res.json();
                if(data.payment_request) {
                    document.getElementById('invoice-text').value = data.payment_request;
                    document.getElementById('waiting-area').style.display = 'block';
                }
            } catch(e) { alert("Error connecting to server!"); }
        }
    </script>
</body>
</html>
